<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antimo Francese - Research</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 0 40px;
        }

        header {
            padding-top: 42px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 42px; 
            border-bottom: 1px solid #ddd; 
        }

        .header-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px; 
            font-weight: 200; 
            color: #5a5959;
            margin: 0;
        }
        
        .header-content h1 a {
            text-decoration: none;
            color: inherit;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center; 
        }

        nav a {
            color: #333;
            text-decoration: none;
            font-size: 18px;
            font-weight: 300; 
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #4A90E2;
        }
        
        section {
            padding: 60px 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 400; 
            margin-bottom: 40px;
            color: #333;
        }

        .nav-socials {
            display: flex;
            gap: 25px; 
        }

        .nav-socials a {
            color: #333;
            text-decoration: none;
            font-size: 22px; 
            font-weight: 400; 
            transition: color 0.3s ease;
        }

        .nav-socials a:hover {
            color: #4A90E2; 
        }

        /* --- Stili per la pagina Research --- */
        .research-item {
            margin-bottom: 40px;
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        
        .research-image {
            width: 150px;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        
        .research-content {
            flex: 1;
        }
        
        .research-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 10px;
            color: #333;
        }
        
        .research-item p {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            text-align: justify;
            margin-bottom: 5px;
        }
        
        .research-item .authors {
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
        }
        
        .research-item a {
            color: #333;
            text-decoration: underline;
            font-weight: 700;
            transition: color 0.3s ease;
        }
        
        .research-item a:hover {
            color: #4A90E2;
        }
        /* --- Fine Stili Research --- */

        footer {
            background-color: #f5f5f5;
            padding: 30px 0;
            text-align: center;
            margin-top: 80px;
        }

        footer p {
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
            
            header {
                padding: 40px 0;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                padding: 0 20px;
            }

            nav {
                gap: 20px;
                flex-wrap: wrap;
            }

            nav a {
                font-size: 16px;
            }
            
            .nav-socials {
                gap: 20px;
            }
            
            .nav-socials a {
                font-size: 20px;
            }

            .section-title {
                font-size: 28px;
            }
            
            .research-item {
                flex-direction: column;
                gap: 15px;
            }
            
            .research-image {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>
                <a href="index.html">ANTIMO FRANCESE</a>
            </h1>
            <nav>
                <a href="research.html">Research</a>
                <!-- <a href="conferences.html">Conferences</a> -->
                <div class="nav-socials">
                    <a href="https://x.com/antimofrancese" target="_blank" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/antimo-francese-695107225" target="_blank" aria-label="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="https://github.com/francesean" target="_blank" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        
        <section id="research">
            <h2 class="section-title"><strong>Research</strong></h2>
            
            <div class="research-item">
                <!-- Immagine a sinistra del titolo della ricerca -->
                <img src="shbraccianti.png" alt="Family Firms Research" class="research-image">
                
                <div class="research-content">
                    <p>
                        <a href="ffirms.html">A story of family firms: evidence from industrialization in Italy.</a>
                    </p>
                    <p>
                        Working paper.
                    </p>
                </div>
            </div>
            
        </section>

    </div>
    <footer>
        <p>&copy; 2026 Antimo Francese. All rights reserved.</p>
    </footer>
</body>
</html>
